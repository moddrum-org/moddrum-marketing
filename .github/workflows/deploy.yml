name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest and redeploy container
        run: |
          ssh ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} << 'EOF'
            cd /opt/moddrum/moddrum-marketing
            git pull
            docker network create moddrum-network 2>/dev/null || true
            docker stop moddrum-marketing 2>/dev/null || true
            docker rm moddrum-marketing 2>/dev/null || true
            docker build -t moddrum-marketing .
            docker run -d \
              --name moddrum-marketing \
              --network moddrum-network \
              --restart unless-stopped \
              moddrum-marketing
          EOF
