  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231e293b'/><path transform='translate(4,4)' fill='white' d='m11.99 18.54-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27z'/></svg>">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #135bec; --blue-dark: #0d47c7; --blue-light: #e8effe; --blue-mid: #3b77f0;
      --green: #16a34a; --green-light: #dcfce7;
      --amber: #d97706; --amber-light: #fef3c7;
      --purple: #7c3aed; --purple-light: #ede9fe;
      --teal: #0d9488; --teal-light: #ccfbf1;
      --red: #dc2626; --red-light: #fee2e2;
      --slate-900: #0f172a; --slate-800: #1e293b; --slate-700: #334155;
      --slate-600: #475569; --slate-500: #64748b; --slate-400: #94a3b8;
      --slate-200: #e2e8f0; --slate-100: #f1f5f9; --slate-50: #f8fafc;
      --white: #ffffff;
      --font: 'Inter', system-ui, sans-serif;
      --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,.08); --shadow-lg: 0 12px 48px rgba(0,0,0,.12);
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); color: var(--slate-800); background: var(--white); line-height: 1.6; -webkit-font-smoothing: antialiased; }

    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .section { padding: 96px 0; }
    .section-sm { padding: 64px 0; }

    /* ─── Header ─── */
    .header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--slate-200); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--slate-900); }
    .logo-icon { width: 30px; height: 30px; color: var(--blue); }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .nav { display: flex; gap: 32px; align-items: center; }
    .nav a { text-decoration: none; color: var(--slate-600); font-size: 14px; font-weight: 500; transition: color .15s; }
    .nav a:hover { color: var(--blue); }
    .header-right { display: flex; gap: 12px; align-items: center; }

    /* ─── Language switcher ─── */
    .lang-switcher { display: flex; align-items: center; background: var(--slate-100); border-radius: 6px; padding: 3px; gap: 2px; }
    .lang-btn { font-family: var(--font); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; color: var(--slate-500); background: transparent; transition: all .15s; letter-spacing: .3px; }
    .lang-btn.active { background: var(--white); color: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .lang-btn:not(.active):hover { color: var(--slate-800); }

    /* ─── Buttons ─── */
    .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font); font-size: 15px; font-weight: 600; padding: 11px 24px; border-radius: var(--radius-sm); border: none; cursor: pointer; text-decoration: none; transition: all .15s; }
    .btn-primary { background: var(--blue); color: var(--white); }
    .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(19,91,236,.35); }
    .btn-white { background: var(--white); color: var(--blue); }
    .btn-white:hover { background: var(--blue-light); transform: translateY(-1px); }
    .btn-ghost { background: rgba(255,255,255,.12); color: white; border: 1.5px solid rgba(255,255,255,.3); }
    .btn-ghost:hover { background: rgba(255,255,255,.2); }
    .btn-sm { font-size: 13px; padding: 8px 18px; }
    .btn-lg { font-size: 17px; padding: 15px 32px; }

    /* ─── Section header ─── */
    .section-tag { display: inline-block; background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 4px 12px; border-radius: 100px; margin-bottom: 16px; }
    .section-title { font-size: clamp(28px, 3.5vw, 44px); font-weight: 900; letter-spacing: -1px; line-height: 1.15; margin-bottom: 16px; color: var(--slate-900); }
    .section-sub { font-size: 18px; color: var(--slate-600); line-height: 1.65; max-width: 640px; }
    .section-header { text-align: center; margin-bottom: 56px; }
    .section-header .section-sub { margin: 0 auto; }

    /* ─── Page hero (dark) ─── */
    .page-hero { background: linear-gradient(160deg, #0a1628 0%, #0d1b3e 40%, #1a2f6b 100%); color: var(--white); padding: 80px 0 72px; text-align: center; position: relative; overflow: hidden; }
    .page-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(59,119,240,.2) 0%, transparent 65%); pointer-events: none; }
    .page-hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.85); font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 100px; margin-bottom: 28px; letter-spacing: .3px; }
    .page-hero h1 { font-size: clamp(32px, 4vw, 56px); font-weight: 900; line-height: 1.08; letter-spacing: -2px; margin-bottom: 20px; position: relative; }
    .page-hero h1 em { font-style: normal; color: #7eb8ff; }
    .page-hero-sub { font-size: 18px; color: rgba(255,255,255,.65); max-width: 560px; margin: 0 auto; line-height: 1.65; position: relative; }

    /* ─── Mission section ─── */
    .mission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
    .mission-content h2 { font-size: clamp(24px, 2.8vw, 36px); font-weight: 900; letter-spacing: -0.8px; line-height: 1.2; margin-bottom: 20px; color: var(--slate-900); }
    .mission-content p { font-size: 16px; color: var(--slate-600); line-height: 1.75; margin-bottom: 20px; }
    .pain-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pain-stat { background: var(--slate-50); border-radius: var(--radius); border: 1.5px solid var(--slate-200); padding: 20px; }
    .pain-stat-num { font-size: 28px; font-weight: 900; color: var(--blue); line-height: 1; margin-bottom: 4px; }
    .pain-stat-lbl { font-size: 13px; color: var(--slate-600); line-height: 1.4; }

    /* ─── Products grid ─── */
    .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .product-card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--slate-200); padding: 24px 20px; text-align: center; text-decoration: none; color: inherit; transition: box-shadow .2s, transform .2s; display: flex; flex-direction: column; align-items: center; }
    .product-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
    .product-icon { font-size: 32px; margin-bottom: 12px; display: block; }
    .product-name { font-size: 15px; font-weight: 700; color: var(--slate-900); margin-bottom: 4px; }
    .product-desc { font-size: 12px; color: var(--slate-500); margin-bottom: 10px; line-height: 1.4; flex: 1; }
    .product-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .badge-live { background: var(--green-light); color: var(--green); }
    .badge-soon { background: var(--slate-100); color: var(--slate-500); }

    /* ─── Company section ─── */
    .company-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; }
    .company-card { background: var(--slate-50); border-radius: var(--radius-lg); border: 1.5px solid var(--slate-200); padding: 32px; }
    .company-card h3 { font-size: 16px; font-weight: 800; color: var(--slate-900); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--slate-200); }
    .company-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .company-row:last-child { margin-bottom: 0; }
    .company-row-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .company-row-body { flex: 1; }
    .company-row-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--slate-400); margin-bottom: 2px; }
    .company-row-value { font-size: 14px; color: var(--slate-800); font-weight: 500; }
    .contact-card { background: linear-gradient(140deg, #0a2a7a 0%, #0f47c8 55%, #3b77f0 100%); border-radius: var(--radius-lg); padding: 32px; color: var(--white); }
    .contact-card h3 { font-size: 16px; font-weight: 800; color: var(--white); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,.15); }
    .contact-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
    .contact-row:last-child { margin-bottom: 0; }
    .contact-row-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .contact-row-body { flex: 1; }
    .contact-row-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: rgba(255,255,255,.5); margin-bottom: 3px; }
    .contact-row-value { font-size: 15px; font-weight: 600; color: var(--white); }
    .contact-row-value a { color: var(--white); text-decoration: none; }
    .contact-row-value a:hover { text-decoration: underline; }
    .contact-note { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.15); font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; }

    /* ─── Policies section ─── */
    .policies-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .policy-card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--slate-200); padding: 28px 24px; }
    .policy-icon { font-size: 28px; margin-bottom: 14px; }
    .policy-card h3 { font-size: 16px; font-weight: 800; color: var(--slate-900); margin-bottom: 12px; }
    .policy-card p { font-size: 14px; color: var(--slate-600); line-height: 1.7; }
    .policy-card ul { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .policy-card ul li { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; color: var(--slate-600); line-height: 1.55; }
    .policy-card ul li::before { content: '→'; font-weight: 800; color: var(--blue); flex-shrink: 0; margin-top: 1px; font-size: 12px; }

    /* ─── CTA section ─── */
    .cta-section { background: linear-gradient(160deg, #0d1b3e 0%, #1a2f6b 60%, #0f47a8 100%); padding: 96px 0; text-align: center; color: var(--white); }
    .cta-section h2 { font-size: clamp(28px, 4vw, 48px); font-weight: 900; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; }
    .cta-section h2 em { font-style: normal; color: #7eb8ff; }
    .cta-section p { font-size: 18px; color: rgba(255,255,255,.7); max-width: 480px; margin: 0 auto 36px; }
    .cta-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .cta-note { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,.4); }

    /* ─── Footer ─── */
    .footer { background: var(--slate-900); padding: 56px 0 32px; }
    .footer-top { display: grid; grid-template-columns: 280px 1fr; gap: 64px; padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 32px; }
    .footer-logo { display: flex; align-items: center; gap: 8px; color: var(--white); text-decoration: none; margin-bottom: 14px; }
    .footer-logo-icon { width: 26px; height: 26px; color: #7eb8ff; }
    .footer-logo-text { font-size: 18px; font-weight: 800; }
    .footer-tagline { font-size: 13px; color: rgba(255,255,255,.4); line-height: 1.65; margin-bottom: 24px; }
    .footer-links-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    .footer-col h5 { font-size: 11px; font-weight: 700; color: rgba(255,255,255,.35); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }
    .footer-col a { display: block; font-size: 14px; color: rgba(255,255,255,.55); text-decoration: none; margin-bottom: 10px; transition: color .15s; }
    .footer-col a:hover { color: var(--white); }
    .footer-col a .soon { font-size: 10px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.4); padding: 1px 6px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
    .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .footer-copy { font-size: 13px; color: rgba(255,255,255,.3); }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 900px) {
      .mission-grid, .company-grid { grid-template-columns: 1fr; gap: 48px; }
      .pain-stats { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .nav { display: none; }
      .policies-grid { grid-template-columns: 1fr; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-top { grid-template-columns: 1fr; gap: 40px; }
      .footer-links-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .pain-stats { grid-template-columns: 1fr 1fr; }
      .products-grid { grid-template-columns: 1fr; }
      .footer-links-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

function setLang(lang) {
  const t = TRANSLATIONS[lang];
  if (!t) return;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });

  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById('btn-' + lang);
  if (activeBtn) activeBtn.classList.add('active');

  try { localStorage.setItem('moddrum_lang', lang); } catch(e) {}
}

// Init: stored preference → browser language → default 'sl'
(function() {
  let lang = 'sl';
  try {
    const stored = localStorage.getItem('moddrum_lang');
    if (stored && TRANSLATIONS[stored]) { lang = stored; }
    else {
      const browser = (navigator.language || '').toLowerCase();
      if (browser.startsWith('en')) lang = 'en';
    }
  } catch(e) {}
  setLang(lang);
  document.documentElement.style.visibility = '';
})();
